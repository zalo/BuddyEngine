# Builds the desktop binaries on every push to main (and on demand):
#   - BuddyEngine.exe       Windows overlay (cross-compiled; pure-Go webview2 loader)
#   - BuddyEngine           Linux windowed build (webkit2gtk-4.1)
#   - BuddyEngine.app.zip   macOS windowed build (universal; unsigned — right-click Open)
# Grab them from the run's artifacts.
name: Build desktop apps

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: 'stable'
      - name: Install wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1
      - name: Build (windows/amd64)
        run: wails build -platform windows/amd64 -s -skipbindings
      - name: Package with workshop packs
        run: |
          mkdir -p _dist
          cp build/bin/BuddyEngine.exe _dist/
          rsync -a --exclude='*.z64' --exclude='*.n64' --exclude='*.v64' \
            --exclude='native/' workshop _dist/
      - uses: actions/upload-artifact@v7
        with:
          name: BuddyEngine-windows
          path: _dist

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: 'stable'
      - name: Install webview dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1
      - name: Build (linux/amd64, webkit 4.1)
        run: wails build -platform linux/amd64 -s -skipbindings -tags webkit2_41
      - name: Package with workshop packs (tar preserves the exec bit)
        run: |
          mkdir -p _dist
          cp build/bin/BuddyEngine _dist/
          rsync -a --exclude='*.z64' --exclude='*.n64' --exclude='*.v64' \
            --exclude='native/' workshop _dist/
          tar -czf BuddyEngine-linux.tar.gz -C _dist .
      - uses: actions/upload-artifact@v7
        with:
          name: BuddyEngine-linux
          path: BuddyEngine-linux.tar.gz

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: 'stable'
      - name: Install wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1
      - name: Build (darwin/universal)
        run: wails build -platform darwin/universal -s -skipbindings
      - name: Bundle workshop packs into the .app
        run: |
          rsync -a --exclude='*.z64' --exclude='*.n64' --exclude='*.v64' \
            --exclude='native/' workshop \
            build/bin/BuddyEngine.app/Contents/Resources/
      - name: Zip .app bundle
        run: ditto -c -k --keepParent build/bin/BuddyEngine.app build/bin/BuddyEngine.app.zip
      - uses: actions/upload-artifact@v7
        with:
          name: BuddyEngine-macos
          path: build/bin/BuddyEngine.app.zip

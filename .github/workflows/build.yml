# Builds the desktop binaries on every push to main (and on demand):
#   - BuddyEngine.exe       Windows overlay (cross-compiled; pure-Go webview2 loader)
#   - BuddyEngine           Linux windowed build (webkit2gtk-4.1)
#   - BuddyEngine.app.zip   macOS windowed build (universal; unsigned — right-click Open)
# Grab them from the run's artifacts.
name: Build desktop apps

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Install wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1
      - name: Build (windows/amd64)
        run: wails build -platform windows/amd64 -s -skipbindings
      - uses: actions/upload-artifact@v4
        with:
          name: BuddyEngine-windows
          path: build/bin/BuddyEngine.exe

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Install webview dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1
      - name: Build (linux/amd64, webkit 4.1)
        run: wails build -platform linux/amd64 -s -skipbindings -tags webkit2_41
      - uses: actions/upload-artifact@v4
        with:
          name: BuddyEngine-linux
          path: build/bin/BuddyEngine

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Install wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1
      - name: Build (darwin/universal)
        run: wails build -platform darwin/universal -s -skipbindings
      - name: Zip .app bundle
        run: ditto -c -k --keepParent build/bin/BuddyEngine.app build/bin/BuddyEngine.app.zip
      - uses: actions/upload-artifact@v4
        with:
          name: BuddyEngine-macos
          path: build/bin/BuddyEngine.app.zip

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>BuddyEngine overlay</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="./style.css">
<style>
  /* Embedded in someone else's page: keep the loading card small + quiet. */
  #overlay .card { transform: scale(0.8); opacity: 0.9; }
  html, body { touch-action: none; }
</style>
</head>
<body>

<div id="overlay">
    <div class="card">
        <h1>BuddyEngine</h1>
        <div class="spinner"></div>
        <div class="status" id="loadStatus">Initializing...</div>
    </div>
</div>

<div id="menu">
    <div class="menu-title">Buddy</div>
    <button id="menu-reset">Reset buddy</button>
    <button id="menu-debug">Debug colliders: off</button>
    <button id="menu-icons">Icon colliders: off</button>
    <button id="menu-packs">Workshop packs...</button>
    <button id="menu-close">Close menu</button>
    <hr>
    <button id="menu-quit" class="danger">Reload buddies</button>
</div>

<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js" } }
</script>
<script type="module" src="./js/overlay-host.js"></script>
</body>
</html>
